<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Workspace tab system product demo</title>
  <desc id="desc">A generic workbench UI with browser-like tabs, a current work item, background tabs, and callouts explaining tab ownership and warm runtime behavior.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#14213d" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef4f8"/>
    </linearGradient>
    <style>
      .bg { fill: #eef3f6; }
      .window { fill: #ffffff; filter: url(#shadow); }
      .line { stroke: #d8e1e7; stroke-width: 2; }
      .soft { fill: #f5f8fb; }
      .nav { fill: #213547; }
      .muted { fill: #607080; }
      .text { fill: #17212b; font-family: Inter, Arial, sans-serif; }
      .title { font-weight: 800; font-size: 38px; }
      .subtitle { font-weight: 600; font-size: 22px; }
      .body { font-size: 20px; }
      .small { font-size: 16px; }
      .tiny { font-size: 14px; }
      .tab { fill: #eef3f6; stroke: #d8e1e7; stroke-width: 1.5; }
      .tab-active { fill: #ffffff; stroke: #2f80ed; stroke-width: 3; }
      .blue { fill: #2f80ed; }
      .green { fill: #22a06b; }
      .orange { fill: #f59e0b; }
      .red { fill: #ef5350; }
      .purple { fill: #7c3aed; }
      .callout { fill: #ffffff; stroke: #d8e1e7; stroke-width: 2; }
      .badge { fill: #e8f2ff; }
      .badgeText { fill: #1d4ed8; font-weight: 700; font-size: 14px; font-family: Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <rect x="74" y="58" width="1452" height="760" rx="28" class="window"/>

  <rect x="74" y="58" width="1452" height="72" rx="28" fill="#f7fafc"/>
  <line x1="74" y1="130" x2="1526" y2="130" class="line"/>
  <circle cx="122" cy="94" r="11" fill="#ff6b6b"/>
  <circle cx="158" cy="94" r="11" fill="#ffd166"/>
  <circle cx="194" cy="94" r="11" fill="#06d6a0"/>
  <rect x="242" y="75" width="750" height="38" rx="19" fill="#ffffff" stroke="#d8e1e7" stroke-width="2"/>
  <text x="272" y="100" class="text small">/workspace/workstreams/42/forecast</text>
  <rect x="1180" y="75" width="136" height="38" rx="19" fill="#edf7f3"/>
  <text x="1204" y="100" class="text small" fill="#177245">Saved tabs</text>
  <rect x="1334" y="75" width="140" height="38" rx="19" fill="#fff5e6"/>
  <text x="1356" y="100" class="text small" fill="#995c00">Share link</text>

  <rect x="74" y="130" width="238" height="688" fill="#213547"/>
  <text x="112" y="184" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Workbench</text>
  <rect x="104" y="224" width="178" height="44" rx="12" fill="#30475d"/>
  <text x="130" y="252" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">My tasks</text>
  <text x="130" y="310" fill="#cbd5df" font-family="Inter, Arial, sans-serif" font-size="18">Workstreams</text>
  <text x="130" y="360" fill="#cbd5df" font-family="Inter, Arial, sans-serif" font-size="18">Reports</text>
  <text x="130" y="410" fill="#cbd5df" font-family="Inter, Arial, sans-serif" font-size="18">Forecast</text>
  <text x="130" y="460" fill="#cbd5df" font-family="Inter, Arial, sans-serif" font-size="18">Tickets</text>
  <rect x="106" y="720" width="170" height="42" rx="12" fill="#172a3a"/>
  <text x="130" y="747" fill="#cbd5df" font-family="Inter, Arial, sans-serif" font-size="16">20 open tabs cap</text>

  <rect x="312" y="130" width="1214" height="74" fill="#f7fafc"/>
  <rect x="344" y="151" width="210" height="50" rx="15" class="tab-active"/>
  <circle cx="374" cy="176" r="8" class="green"/>
  <text x="394" y="183" class="text small" font-weight="800">Workstream #42</text>
  <rect x="570" y="151" width="178" height="50" rx="15" class="tab"/>
  <circle cx="600" cy="176" r="8" class="orange"/>
  <text x="620" y="183" class="text small">Forecast</text>
  <rect x="764" y="151" width="196" height="50" rx="15" class="tab"/>
  <circle cx="794" cy="176" r="8" class="purple"/>
  <text x="814" y="183" class="text small">Ticket #2048</text>
  <rect x="976" y="151" width="178" height="50" rx="15" class="tab"/>
  <circle cx="1006" cy="176" r="8" class="red"/>
  <text x="1026" y="183" class="text small">Report view</text>
  <rect x="1170" y="151" width="112" height="50" rx="15" fill="#edf2f7" stroke="#d8e1e7" stroke-width="1.5"/>
  <text x="1200" y="183" class="text small" font-weight="700">+ New</text>

  <rect x="344" y="240" width="760" height="488" rx="22" fill="url(#panel)" stroke="#d8e1e7" stroke-width="2"/>
  <text x="384" y="298" class="text title">Workstream #42</text>
  <text x="384" y="336" class="muted body">Current tab owns the URL, overlays, focus events, and foreground CPU.</text>
  <rect x="384" y="374" width="196" height="44" rx="22" class="badge"/>
  <text x="412" y="402" class="badgeText">ACTIVE RUNTIME</text>
  <rect x="604" y="374" width="172" height="44" rx="22" fill="#eafaf1"/>
  <text x="632" y="402" fill="#16794a" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">URL OWNER</text>
  <rect x="800" y="374" width="190" height="44" rx="22" fill="#fff4db"/>
  <text x="826" y="402" fill="#9a5b00" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">OVERLAY SCOPE</text>

  <rect x="384" y="462" width="310" height="190" rx="18" fill="#ffffff" stroke="#d8e1e7" stroke-width="2"/>
  <text x="416" y="502" class="text subtitle">Task board</text>
  <rect x="416" y="528" width="236" height="24" rx="12" fill="#e2e8f0"/>
  <rect x="416" y="570" width="186" height="24" rx="12" fill="#dbeafe"/>
  <rect x="416" y="612" width="220" height="24" rx="12" fill="#dcfce7"/>

  <rect x="734" y="462" width="330" height="190" rx="18" fill="#ffffff" stroke="#d8e1e7" stroke-width="2"/>
  <text x="766" y="502" class="text subtitle">Scoped modal</text>
  <rect x="766" y="528" width="252" height="74" rx="14" fill="#f1f5f9"/>
  <text x="790" y="558" class="muted small">Visible only inside</text>
  <text x="790" y="584" class="muted small">the focused tab.</text>
  <rect x="766" y="620" width="120" height="28" rx="14" class="blue"/>
  <text x="796" y="640" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800">Save</text>

  <rect x="1144" y="240" width="304" height="488" rx="22" fill="#ffffff" stroke="#d8e1e7" stroke-width="2"/>
  <text x="1176" y="296" class="text subtitle">What the user sees</text>
  <line x1="1176" y1="320" x2="1418" y2="320" class="line"/>
  <circle cx="1190" cy="362" r="8" class="blue"/>
  <text x="1212" y="368" class="text small">Open several tasks once</text>
  <circle cx="1190" cy="420" r="8" class="green"/>
  <text x="1212" y="426" class="text small">Switch back without reload</text>
  <circle cx="1190" cy="478" r="8" class="orange"/>
  <text x="1212" y="484" class="text small">Copy a real business URL</text>
  <circle cx="1190" cy="536" r="8" class="purple"/>
  <text x="1212" y="542" class="text small">Keep background tabs quiet</text>
  <line x1="1176" y1="586" x2="1418" y2="586" class="line"/>
  <text x="1176" y="632" class="muted small">The tab bar is the visible part.</text>
  <text x="1176" y="662" class="muted small">The hard part is ownership:</text>
  <text x="1176" y="692" class="muted small">URL, cache, events, overlays, CPU.</text>

  <path d="M 1030 202 C 1120 230 1136 260 1148 306" fill="none" stroke="#2f80ed" stroke-width="4" stroke-linecap="round"/>
  <path d="M 1096 610 C 1120 626 1128 642 1144 654" fill="none" stroke="#22a06b" stroke-width="4" stroke-linecap="round"/>

  <rect x="344" y="760" width="1104" height="34" rx="17" fill="#edf2f7"/>
  <text x="382" y="783" class="text tiny" font-weight="800">Demo scenario:</text>
  <text x="500" y="783" class="muted tiny">A user opens multiple work items, switches like a browser, and the host keeps only the focused tab in charge.</text>
</svg>
