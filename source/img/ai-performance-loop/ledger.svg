<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Performance ledger example</title>
  <desc id="desc">An example of ledger rows used to keep performance rounds accountable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 36px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .head { font: 700 15px Inter, Arial, sans-serif; fill: #f8fafc; }
      .cell { font: 400 15px Inter, Arial, sans-serif; fill: #334155; }
      .strong { font: 700 15px Inter, Arial, sans-serif; fill: #0f172a; }
      .ok { font: 700 14px Inter, Arial, sans-serif; fill: #047857; }
      .warn { font: 700 14px Inter, Arial, sans-serif; fill: #b45309; }
      .bad { font: 700 14px Inter, Arial, sans-serif; fill: #b91c1c; }
      .line { stroke: #cbd5e1; stroke-width: 1; }
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="74" class="title">The Ledger Is Part of the Harness</text>
  <text x="70" y="108" class="subtitle">It keeps the agent honest: every round records the baseline, change, delta, verdict, and next bottleneck.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="165" width="1060" height="420" rx="16" fill="#ffffff"/>
    <rect x="70" y="165" width="1060" height="58" rx="16" fill="#0f766e"/>
    <rect x="70" y="205" width="1060" height="18" fill="#0f766e"/>
  </g>

  <text x="95" y="201" class="head">Round</text>
  <text x="190" y="201" class="head">Change</text>
  <text x="430" y="201" class="head">Evidence</text>
  <text x="710" y="201" class="head">Delta</text>
  <text x="830" y="201" class="head">Verdict</text>
  <text x="960" y="201" class="head">Next</text>

  <line x1="70" y1="296" x2="1130" y2="296" class="line"/>
  <line x1="70" y1="369" x2="1130" y2="369" class="line"/>
  <line x1="70" y1="442" x2="1130" y2="442" class="line"/>
  <line x1="70" y1="515" x2="1130" y2="515" class="line"/>

  <text x="95" y="260" class="strong">R1</text>
  <text x="190" y="252" class="cell">Consume host prefetch</text>
  <text x="190" y="276" class="cell">instead of refetching</text>
  <text x="430" y="252" class="cell">Duplicate first-screen API</text>
  <text x="430" y="276" class="cell">removed from FMP path</text>
  <text x="710" y="264" class="cell">down</text>
  <text x="830" y="264" class="ok">strict win</text>
  <text x="960" y="252" class="cell">largest remaining</text>
  <text x="960" y="276" class="cell">subapp chunk</text>

  <text x="95" y="333" class="strong">R2</text>
  <text x="190" y="325" class="cell">Repair final marker</text>
  <text x="190" y="349" class="cell">and route capture</text>
  <text x="430" y="325" class="cell">Previous capture hit login</text>
  <text x="430" y="349" class="cell">page, not the app</text>
  <text x="710" y="337" class="cell">N/A</text>
  <text x="830" y="337" class="warn">measurement</text>
  <text x="960" y="325" class="cell">rerun strict</text>
  <text x="960" y="349" class="cell">profile</text>

  <text x="95" y="406" class="strong">R3</text>
  <text x="190" y="398" class="cell">Try early hot-tab</text>
  <text x="190" y="422" class="cell">visibility</text>
  <text x="430" y="398" class="cell">Shell looked faster, but</text>
  <text x="430" y="422" class="cell">post-visible jank rose</text>
  <text x="710" y="410" class="cell">mixed</text>
  <text x="830" y="410" class="bad">not a win</text>
  <text x="960" y="398" class="cell">fix/revert before</text>
  <text x="960" y="422" class="cell">next change</text>

  <text x="95" y="479" class="strong">R4</text>
  <text x="190" y="471" class="cell">Defer non-FMP SDK</text>
  <text x="190" y="495" class="cell">after first content</text>
  <text x="430" y="471" class="cell">Main-thread work moved</text>
  <text x="430" y="495" class="cell">out of critical window</text>
  <text x="710" y="483" class="cell">down</text>
  <text x="830" y="483" class="ok">accepted</text>
  <text x="960" y="471" class="cell">slow BFF</text>
  <text x="960" y="495" class="cell">dependency</text>

  <text x="95" y="552" class="strong">R5</text>
  <text x="190" y="544" class="cell">Backend dependency</text>
  <text x="190" y="568" class="cell">identified</text>
  <text x="430" y="544" class="cell">Request ID and timing show</text>
  <text x="430" y="568" class="cell">non-frontend blocker</text>
  <text x="710" y="556" class="cell">blocked</text>
  <text x="830" y="556" class="warn">handoff</text>
  <text x="960" y="544" class="cell">owner action</text>
  <text x="960" y="568" class="cell">or mock gate</text>

  <rect x="250" y="625" width="700" height="46" rx="23" fill="#0f172a"/>
  <text x="600" y="654" text-anchor="middle" style="font:700 17px Inter, Arial, sans-serif;fill:#fff">The ledger prevents fake progress from becoming accepted progress</text>
</svg>
