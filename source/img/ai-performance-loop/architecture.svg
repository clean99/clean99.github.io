<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI performance optimization architecture</title>
  <desc id="desc">A goal-driven agent loop connects a harness, capability layer, code changes, deployment, and a ledger.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 36px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .card-title { font: 700 22px Inter, Arial, sans-serif; fill: #0f172a; }
      .card-copy { font: 400 16px Inter, Arial, sans-serif; fill: #475569; }
      .label { font: 700 14px Inter, Arial, sans-serif; fill: #0f172a; letter-spacing: .04em; }
      .pill { font: 700 15px Inter, Arial, sans-serif; fill: #ffffff; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .soft-line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="74" class="title">Automated AI Performance Optimization</text>
  <text x="70" y="108" class="subtitle">The skill is not a prompt. It is a closed loop: goal, harness, capability layer, evidence, and memory.</text>

  <rect x="470" y="170" width="260" height="160" rx="18" fill="url(#primary)" filter="url(#shadow)"/>
  <text x="600" y="222" text-anchor="middle" class="pill">Goal-Driven</text>
  <text x="600" y="252" text-anchor="middle" class="pill">Agent Loop</text>
  <text x="600" y="286" text-anchor="middle" class="pill" opacity="0.86">one bottleneck</text>
  <text x="600" y="310" text-anchor="middle" class="pill" opacity="0.86">one verified round</text>

  <rect x="70" y="180" width="270" height="150" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="100" y="224" class="card-title">Goal</text>
  <text x="100" y="258" class="card-copy">Target metric and route</text>
  <text x="100" y="286" class="card-copy">Example: reduce FMP by 30%</text>

  <rect x="860" y="180" width="270" height="150" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="890" y="224" class="card-title">Harness</text>
  <text x="890" y="258" class="card-copy">Same route, same marker</text>
  <text x="890" y="286" class="card-copy">4G + CPU 4x + no cache</text>

  <rect x="70" y="430" width="270" height="160" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="100" y="474" class="card-title">Capability Layer</text>
  <text x="100" y="508" class="card-copy">Docs, tests, deployment</text>
  <text x="100" y="536" class="card-copy">logs, Slardar, profiling</text>

  <rect x="465" y="430" width="270" height="160" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="495" y="474" class="card-title">Focused Patch</text>
  <text x="495" y="508" class="card-copy">Fix the next proven bottleneck</text>
  <text x="495" y="536" class="card-copy">Run local gates before deploy</text>

  <rect x="860" y="430" width="270" height="160" rx="14" fill="#ffffff" filter="url(#shadow)"/>
  <text x="890" y="474" class="card-title">Ledger</text>
  <text x="890" y="508" class="card-copy">Baseline, delta, verdict</text>
  <text x="890" y="536" class="card-copy">Accepted, negative, blocked</text>

  <path class="line" d="M340 255 C390 245 420 240 460 240"/>
  <path class="line" d="M730 240 C775 240 810 245 850 255"/>
  <path class="line" d="M870 330 C820 390 775 430 745 482"/>
  <path class="line" d="M465 510 C410 510 380 510 350 510"/>
  <path class="line" d="M340 430 C385 360 435 320 475 295"/>
  <path class="line" d="M735 510 C780 510 815 510 850 510"/>
  <path class="soft-line" d="M995 430 C940 350 835 320 730 292"/>

  <rect x="420" y="628" width="360" height="44" rx="22" fill="#0f172a"/>
  <text x="600" y="657" text-anchor="middle" class="pill">Evidence decides the next action</text>
</svg>
