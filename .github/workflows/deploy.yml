name: Deploy Hexo Blog

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_CODEX_SETUP_TOKEN: ${{ secrets.CODEX_SETUP_TOKEN != '' }}

    steps:
      - name: Checkout dev branch
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Checkout setup source
        if: env.HAS_CODEX_SETUP_TOKEN == 'true'
        uses: actions/checkout@v4
        with:
          repository: clean99/codex-setup
          ref: main
          path: .cache/codex-setup
          token: ${{ secrets.CODEX_SETUP_TOKEN }}

      - name: Refresh public catalog
        if: env.HAS_CODEX_SETUP_TOKEN == 'true'
        run: npm run ai-coding-lab:build
        env:
          CODEX_SETUP_DIR: .cache/codex-setup

      - name: Generate static files
        run: npm run clean && npx hexo generate

      - name: Deploy to master branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: master
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Site updated: ${{ github.event.head_commit.message }}'
