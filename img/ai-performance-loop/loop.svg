<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Performance loop flow</title>
  <desc id="desc">A continuous performance loop from profiling to waterfall, diagnosis, fix, verification, deployment, comparison, documentation, and repeat.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 36px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Inter, Arial, sans-serif; fill: #475569; }
      .node-title { font: 700 19px Inter, Arial, sans-serif; fill: #0f172a; }
      .node-copy { font: 400 14px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 700 13px Inter, Arial, sans-serif; fill: #0f766e; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .guard { stroke: #ef4444; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 8 8; }
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="70" y="74" class="title">The Round Is the Unit of Work</text>
  <text x="70" y="108" class="subtitle">A useful optimization is not a patch. It is a measured round with a verdict.</text>

  <g filter="url(#shadow)">
    <rect x="94" y="190" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="365" y="150" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="636" y="190" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="907" y="150" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="907" y="420" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="636" y="465" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="365" y="420" width="205" height="105" rx="14" fill="#ffffff"/>
    <rect x="94" y="465" width="205" height="105" rx="14" fill="#ffffff"/>
  </g>

  <text x="125" y="232" class="node-title">Profile</text>
  <text x="125" y="260" class="node-copy">Strict browser capture</text>
  <text x="397" y="192" class="node-title">Waterfall</text>
  <text x="397" y="220" class="node-copy">Resource + marker timing</text>
  <text x="668" y="232" class="node-title">Diagnose</text>
  <text x="668" y="260" class="node-copy">Pick one bottleneck</text>
  <text x="939" y="192" class="node-title">Fix</text>
  <text x="939" y="220" class="node-copy">Small focused patch</text>
  <text x="939" y="462" class="node-title">Local Gate</text>
  <text x="939" y="490" class="node-copy">Lint, tests, E2E</text>
  <text x="668" y="507" class="node-title">Deploy</text>
  <text x="668" y="535" class="node-copy">Swimlane/PPE proof</text>
  <text x="397" y="462" class="node-title">Compare</text>
  <text x="397" y="490" class="node-copy">Previous vs current</text>
  <text x="125" y="507" class="node-title">Document</text>
  <text x="125" y="535" class="node-copy">Ledger + next target</text>

  <path class="line" d="M299 226 C328 212 337 204 365 202"/>
  <path class="line" d="M570 202 C600 207 607 216 636 232"/>
  <path class="line" d="M841 232 C870 214 879 204 907 202"/>
  <path class="line" d="M1009 255 C1048 315 1048 360 1010 420"/>
  <path class="line" d="M907 472 C878 493 870 507 841 517"/>
  <path class="line" d="M636 517 C607 507 600 493 570 472"/>
  <path class="line" d="M365 472 C337 493 328 507 299 517"/>
  <path class="line" d="M196 465 C150 392 150 352 196 295"/>

  <path class="guard" d="M570 525 C635 630 870 630 940 525"/>
  <text x="755" y="650" text-anchor="middle" class="small">If the result is worse or unmeasured, fix/revert before stacking another change</text>

  <rect x="420" y="332" width="360" height="58" rx="29" fill="#0f172a"/>
  <text x="600" y="368" text-anchor="middle" style="font:700 18px Inter, Arial, sans-serif;fill:#fff">No strict delta, no performance claim</text>
</svg>
