<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Workspace tab system product demo</title>
  <desc id="desc">A generic workspace product screen with a top workspace header, browser-like tab strip, business entry chips, object filters, and a table of work items.</desc>
  <defs>
    <filter id="shadow" x="-8%" y="-10%" width="116%" height="126%">
