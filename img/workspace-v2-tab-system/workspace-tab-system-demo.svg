      .small { font-size: 14px; }
      .tiny { font-size: 12px; }
      .strong { font-weight: 800; }
      .chip { fill: #fff; stroke: #dfe5ea; stroke-width: 1.4; }
      .chipActive { fill: #e8fbf8; stroke: #49c9bd; stroke-width: 1.5; }
      .tab { fill: #f8fafc; stroke: #e5e7eb; stroke-width: 1.2; }
      .tabActive { fill: #fff; stroke: #e5e7eb; stroke-width: 1.2; }
      .teal { fill: #12b3a8; }
      .blue { fill: #1d9bf0; }
      .purple { fill: #8b5cf6; }
      .orange { fill: #f59e0b; }
      .green { fill: #22a06b; }
      .red { fill: #f05252; }
      .black { fill: #050505; }
    </style>
